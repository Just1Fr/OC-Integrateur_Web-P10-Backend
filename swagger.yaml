swagger: '2.0'
info:
  title: Bank Argent API documentation
  description: Contains all available API endpoints in this codebase
  version: '1.0.0'
  termsOfService: 'http://swagger.io/terms/'
host: localhost:3001
basePath: /api/v1
schemes:
  - http
paths:
  /user/login:
    post:
      tags:
        - User Module
      summary: Login
      description: API for Login
      parameters:
        - in: body
          name: body
          description: Login Payload
          required: true
          schema:
            $ref: '#/definitions/Login'
      produces:
        - application/json
      responses:
        '200':
          description: Login Successfully
          schema:
            $ref: '#/definitions/LoginResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
  /user/signup:
    post:
      tags:
        - User Module
      summary: Signup
      description: API for Signup
      parameters:
        - in: body
          name: body
          description: Signup Payload
          required: true
          schema:
            $ref: '#/definitions/User'
      produces:
        - application/json
      responses:
        '200':
          description: Signup Successfully
          schema:
            $ref: '#/definitions/ApiResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
  /user/profile:
    get:
      security:
        - Bearer: []
      tags:
        - User Module
      summary: User Profile API
      description: API for fetching a user profile
      #produces:
       # - application/json
      responses:
        '200':
          description: User profile retrieved successully
          schema:
            $ref: '#/definitions/ApiResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
    put:
      security:
        - Bearer: []
      tags:
        - User Module
      summary: User Profile API
      description: API for updating a user profile
      parameters:
        - in: body
          name: body
          description: Update user profile attributes
          required: true
          schema:
            $ref: '#/definitions/UserProfile'
      produces:
        - application/json
      responses:
        '200':
          description: User profile retrieved successully
          schema:
            $ref: '#/definitions/ApiResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
  /user/accounts:
    get:
      security:
        - Bearer: []
      tags:
        - Account Module
      summary: Accounts List
      description: API for fetching accounts id
      produces:
       - application/json
      responses:
        '200':
          description: Accounts retrieved successully
          schema:
            $ref: '#/definitions/AccountsId'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
  /user/accounts/{accountId}/transactions:
    get:
      security:
        - Bearer: []
      tags:
        - Account Module
      summary: Account Transactions
      description: API for fetching account transactions id
      produces:
       - application/json
      parameters:
        - in: path
          name: accountId
          type: integer
          required: true
          description: Account Id
      responses:
        '200':
          description: Transactions retrieved successully
          schema:
            $ref: '#/definitions/TransactionsId'
        '400':
          description: Invalid Fields
        '404':
          description: Account Not Found
        '500':
          description: Internal Server Error
  /user/accounts/{accountId}/transactions/{transactionId}:
    get:
      security:
        - Bearer: []
      tags:
        - Account Module
      summary: Transaction Details
      description: API for fetching account transactions id
      produces:
       - application/json
      parameters:
        - in: path
          name: accountId
          type: integer
          required: true
          description: Account Id
        - in: path
          name: transactionId
          type: integer
          required: true
          description: transaction Id
      responses:
        '200':
          description: Transaction details retrieved successully
          schema:
            $ref: '#/definitions/Transaction'
        '400':
          description: Invalid Fields
        '404':
          description: Transaction Not Found
        '500':
          description: Internal Server Error
  /user/accounts/{accountId}/transactions/{transactionId}/category:
    put:
      security:
        - Bearer: []
      tags:
        - Account Module
      summary: Transaction Category
      description: API for updating a user profile
      parameters:
        - in: path
          name: accountId
          type: integer
          required: true
          description: Account Id
        - in: path
          name: transactionId
          type: integer
          required: true
          description: Transaction Id
        - in: body
          name: body
          schema:
            $ref: '#/definitions/TransactionCategory'
          required: true
          description: Update transaction category
      produces:
        - application/json
      responses:
        '200':
          description: Transaction category updated successully
        '400':
          description: Invalid Fields
        '404':
          description: Account or Transaction Not Found
        '500':
          description: Internal Server Error
  /user/accounts/{accountId}/transactions/{transactionId}/note:
    put:
      security:
        - Bearer: []
      tags:
        - Account Module
      summary: Transaction Category
      description: API for updating a user profile
      parameters:
        - in: path
          name: accountId
          type: integer
          required: true
          description: Account Id
        - in: path
          name: transactionId
          type: integer
          required: true
          description: Transaction Id
        - in: body
          name: body
          schema:
            $ref: '#/definitions/TransactionNote'
          required: true
          description: Update transaction note
      produces:
        - application/json
      responses:
        '200':
          description: Transaction note updated successully
        '400':
          description: Invalid Fields
        '404':
          description: Account or Transaction Not Found
        '500':
          description: Internal Server Error
securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header
definitions:
  User:
    properties:
      email:
        type: string
        description: user email
      password:
        type: string
        description: user password
      firstName:
        type: string
        description: user first name
      lastName:
        type: string
        description: user last name
      userName:
        type: string
        description: user public name
  Login:
    properties:
      email:
        type: string
        description: user email
      password:
        type: string
        description: user password
  ApiResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: object
        properties:
          id:
            type: string
          email:
            type: string
  LoginResponse:
    type: object
    properties:
      token:
        type: string
  UserProfile:
    type: object
    properties:
      userName:
        type: string
  AccountsId:
    type: array
    items:
      type: integer
      description: Account Id
  TransactionsId:
    type: array
    items:
      type: integer
      description: Transaction Id
  Transaction:
    type: object
    properties:
      date:
        type: string
        format: date-time
        description: Transaction date
      description:
        type: string
        description: Transaction description
      amount:
        type: number
        description: Transaction amount
      balance:
        type: number
        description: Balance after transaction
      type:
        type: string
        description: Transaction type
      category:
        type: string
        description: Transaction category
      note:
        type: string
        description: Transaction note
  TransactionCategory:
    type: string
    description: Transaction category
  TransactionNote:
    type: string
    description: Transaction note